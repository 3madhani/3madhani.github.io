<body>
  <!-- ✅ Auto-update the app when a new service worker is available -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('flutter_service_worker.js?v=612149293').then((registration) => {
          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('⚡ New version detected — reloading...');
                // Unregister old service worker to ensure full cache reset
                navigator.serviceWorker.getRegistrations().then(registrations => {
                  for (let r of registrations) r.unregister();
                }).finally(() => {
                  window.location.reload(true);
                });
              }
            };
          };
        }).catch(err => console.error('Service worker registration failed:', err));
      });
    }
  </script>
