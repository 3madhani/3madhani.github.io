<body>
  <script>
    // 🔄 Force update if a new version of the service worker is available
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('flutter_service_worker.js?v=1468060542').then((registration) => {
          registration.onupdatefound = () => {
            const installingWorker = registration.installing;
            installingWorker.onstatechange = () => {
              if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('⚡ New version detected — refreshing...');
                window.location.reload(); // 🔁 Auto reload on new version
              }
            };
          };
        }).catch(err => console.error('Service worker registration failed:', err));
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
